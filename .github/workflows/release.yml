name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: sily-linux-x86_64.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            asset: sily-macos-arm64.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            asset: sily-macos-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p sily-cli --target ${{ matrix.target }}

      - name: Package
        run: tar -czf "${{ matrix.asset }}" -C "target/${{ matrix.target }}/release" sily

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
